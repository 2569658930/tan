<script id="novelData" type="application/json">{"hot": [{"id": "1630324483249155", "title": "偏偏世子要娶我", "author": "温幸运", "abstract": "作为大长公主之女，一出生就是郡主之尊，定下与护国公世子的婚事，是大安朝人人羡慕的一对；一夜之间，全家一百余口人被冠上通敌的罪名，午门砍头。他却和庶妹给了自己一杯毒酒。原来所有的一切，都是阴谋。重生归来，她联手爱人，护好所有亲人，让一切恶人恶有恶报。"}, {"id": "6698512561156918275", "title": "人生三十", "author": "七分生", "abstract": "事业破产，娇妻背叛！成年人的世界没有容易。不穿越，无重生。没有意淫，只有真实，脚踏实地一步一个脚印逆风翻盘，走上神坛！\n八零后专属，玻璃心以及没经历过生活毒打者慎入！勿看！"}, {"id": "1625353478176782", "title": "极品仙尊在都市", "author": "扮阳吃虎", "abstract": "仙域万仙之尊一睁眼，居然成了上门女婿。\n前世被人各种瞧不起，重生之后，成了古武界的天才宗师，医学界的超级神医，术可通天，力能裂地。"}, {"id": "6730119336171670536", "title": "最强弃子", "author": "一毛渡江", "abstract": "林东阳，十二年前被家族抛弃沦为弃子，十二年后权势滔天富可敌国的他王者归来；\n他不仅打造了一个全球超级商业帝国，更是最神秘的组织“恶魔岛”的黄泉教主。"}, {"id": "1619002277549060", "title": "西游天殇", "author": "叶之秋", "abstract": "孙悟空上续太古以来的仙神争霸，下连诸天仙尊神王血斗，一路斩妖除魔，成就一段不朽传奇。天殇延续老叶一贯的权谋风格，局中有局，套中有套，被许多读者认为是写得最好的西游后传。"}, {"id": "1624278158883844", "title": "帝国争霸", "author": "白色孤岛", "abstract": "陈子昂一觉醒来，发现自己穿越到了陌生的年代，金戈铁马，满目疮痍，这是一个支离破碎的时代，这也是一个群雄逐鹿的时代，这是最好的时代，也是最坏的时代，陈子昂崛起于草莽，组建精锐之师，横扫天下，拯救黎明百姓，建立无上帝国！"}, {"id": "1631142533641227", "title": "农家子的科举之路", "author": "山的那边", "abstract": "穿越成家徒四壁的书生，前世计算机专业毕业，在此百无一用……姜丰想了想：万般皆下品，惟有读书高，还是硬着头皮考科举吧！\n这一路走下去，蓦然回首，已位极人臣、开疆拓土、创不世之基业了！PS：新书《一品寒士》已发布。"}, {"id": "1624193943574542", "title": "都市兵王", "author": "神无踪", "abstract": "【完结精品】【兵王】【校花】\n他姓陈、名生、字八荒，本是至强兵王，因一场意外入狱，监狱里各个都是人才，他喜得超强传承，回归花花世界保护大校花，他一次次拔刀，一路攀登，暮然回首已是遍地荣光。"}, {"id": "6693874279383043083", "title": "深渊星芒", "author": "星宇科幻", "abstract": "2185年，从高维通道传送过来的低级虫子占据了整个太阳系，人类被迫背井离乡，舍弃太阳系寻找新的家园，一路走来，流浪的地球舰队发现事情远远不是虫族入侵那么简单，整个银河系的文明都陷入了一场巨大的阴谋中。这是一个囊括银河系背景宏大的科幻故事，没有机甲进化，没有基因超神，更没有修炼渡劫。"}, {"id": "1621553079684110", "title": "走偏门", "author": "李二不哈", "abstract": "【改编短剧《捞偏门》《走偏门》《做局人》，漫剧《捞偏门之北漂》《歪路逆袭》《千面江湖》《捞偏记》感兴趣可以去看看】\n何为偏门？捞偏者，为自己谋活路，给他人算死局。一入偏门深似海，从此走遍五湖四海，混迹三教九流，见识世道人心。"}], "new": [{"id": "6766157068916231182", "title": "女总裁的超级司机", "author": "凤凰孤狼", "abstract": "虽然只是一名小司机，却有着常人所没有的大智慧，虽然只是一名小司机，却有着非同凡响的洞察力，虽然只是一名小司机，却与上司有着不一般的关系，虽然只是一名小司机，却在前行的路上缔造了一个又一个神话。"}, {"id": "6710491544828251147", "title": "武林七诀", "author": "注销用户1147545691098731", "abstract": "相传江湖有七种上乘武学，名为“武林七诀”。当年靖难之役明惠帝流落江湖消失于淮南一带，两百多年后淮南萧家堡惨遭灭门。幸存者萧凌踏入江湖寻觅真相，而因“武林七诀”之一鬼脉诀重现江湖卷入一场血雨腥风。"}, {"id": "1628345327911948", "title": "长生不可期", "author": "独孤一生只为你", "abstract": "“前辈你冷静冷静！我年纪还小！您就行行好放了我吧？”李无邪哀求不断，却始终无法摆脱眼前这个魔道女祖，\n她一万岁，艳压天下众仙，渡劫大能，魔道四大宗门，仙楼楼主。他是三清师兄们眼中的单纯小师弟，生性善良，结果却被她挥手镇压五花大绑起来，\n“老女人，死女人，臭女人，你今日若敢碰我，我师父知道一定不会饶了你？”\n“呦，小夫君三十来岁没有，脾气却是不好，来来来，妾身教教你怎么做人？”"}, {"id": "6742284482226686979", "title": "都市天兵：我的碰瓷老公", "author": "昨知", "abstract": "为逼女儿嫁给富二代，洛天震从路上拉了一个碰瓷的废物少年回家，让女儿二选一。没想到女儿直接拉着碰瓷少年去领了证……更没想到的是，这个碰瓷的废物少年身份并不一般：京城大少、第一大家族唯一继承人、修炼者、天界天兵……"}, {"id": "6740800866741128199", "title": "星灵之石", "author": "源风广漠", "abstract": "【我们等待了121亿年】【这是我们最后一次机会】【远古的星灵已经死去】【我们的宇宙正在被吞噬】【散落在银河系文明中的星灵之石】【是毁灭还是重生】"}, {"id": "6707567410615946254", "title": "万灵葬天", "author": "红尘心", "abstract": "无尽岁月后，少年锁囚从沙漠走出，世间灾难劫数降临...！\n他，是后世震惊天地的千古人王！\n他，是后世横推豪杰的索命死神！\n他，是后世一剑断时空的盖世剑神！\n他...也是人们心目中的希望，经历万千磨难，成就万世传奇之人！\n世人皆不凡，那有完美身，为人者，擅其长，每个人都能成为自己的传奇，因为，自己就是自己的主角，人生的这张画卷之上，只有终点之前的点点滴滴，你准备好了吗？请降临哪个属于你的光环之上！"}, {"id": "6687044045451037709", "title": "婚戒", "author": "鹰神A", "abstract": "（书名婚戒不是结婚戒指，而是婚姻生活需要戒许多，其中一条戒出轨，这可是底线。）\n欧阳敏娜超级模特，人称女王，婚后忍受不了寂寞，对婚姻开始不安分玩起了名堂。\n杨青山常年海外出差办公不问家事，对妻子照顾不周。\n夫妻离异后，夫妻仕途一片光明，当女明星，当大总裁。\n由于杨青山的原因，导致幼女杨朵朵发生巨大变化，……"}, {"id": "6769501911100951565", "title": "神龙快婿", "author": "风中的阳光", "abstract": "他本是一方战神，却因为伤病一傻三年，被人百般凌辱，唯有漂亮妻子与他不离不弃！\n情敌千方百计把他妻子骗到酒店，这时，他突然苏醒！\n战神归来，势不可挡！凡欺辱我者皆需付出代价！"}, {"id": "6683094033801153549", "title": "逍遥医婿", "author": "秘制红烧肉", "abstract": "遭人迫害疯了十年的段浪，机缘巧合下获得上古药王的传承，从此开启开挂人生。"}]}</script>

<script>
var D=JSON.parse(document.getElementById("novelData").textContent);
var T="rank";
function S(t){T=t;document.querySelectorAll(".ti").forEach(function(x,i){x.classList.toggle("ac",["rank","trend","outline"].indexOf(t)===i)});M()}
function M(){if(T==="rank")R();else if(T==="trend")Tr();else O()}

var CR="hot";
function R(){
  var h='<div style="display:flex;gap:8px;margin-bottom:16px"><button class="bt bs" style="background:'+(CR==="hot"?"linear-gradient(135deg,#6666ff,#8844ff)":"rgba(255,255,255,.08)")+'" onclick="CR=\'hot\';R()">🔥 热门</button><button class="bt bs" style="background:'+(CR==="new"?"linear-gradient(135deg,#6666ff,#8844ff)":"rgba(255,255,255,.08)")+'" onclick="CR=\'new\';R()">🆕 新书</button></div>';
  (D[CR]||[]).forEach(function(b,i){var a=A(b.title,b.abstract);h+='<div class="bk" onclick="X(this)"><h4>'+(i+1)+'. '+E(b.title)+'</h4><div class="mt">✍ '+E(b.author)+'</div><div class="ab">'+E(b.abstract||"")+'</div><div class="an">';
  if(a.ty)h+='<div class="ln">🎯 类型：<b>'+a.ty+'</b></div>';
  if(a.st)h+='<div class="ln">📌 子类：'+a.st+'</div>';
  if(a.hk.length)h+='<div class="ln">🪝 钩子：'+a.hk.map(function(x){return'<span class="tg">'+x+'</span>'}).join(" ")+'</div>';
  if(a.tr.length)h+='<div class="ln">🎭 套路：'+a.tr.map(function(x){return'<span class="tg2">'+x+'</span>'}).join(" ")+'</div>';
  h+='<div class="ln">💭 基调：'+a.em+' | ⚡ 节奏：'+a.pc+'</div>';
  if(a.tp.length)h+='<div class="ln">💡 '+a.tp.map(function(x){return'<span class="tg">'+x+'</span>'}).join(" ")+'</div>';
  h+='</div></div>'});document.getElementById("main").innerHTML=h}
function X(e){e.querySelector(".ab").classList.toggle("xp");e.querySelector(".an").classList.toggle("sh")}

function A(tl,ab){var r={ty:"",st:"",hk:[],tr:[],em:"",pc:"",tp:[]};var tx=tl+(ab||"");if(!tx)return r;
var tys=[["重生","重生逆袭"],["穿越","穿越架空"],["修仙|修真|仙尊","修仙玄幻"],["宫斗|宅斗","宫斗宅斗"],["总裁|豪门","总裁豪门"],["种田|基建","种田基建"],["悬疑|推理","悬疑推理"],["末世|末日","末世求生"],["星际|宇宙|科幻","星际科幻"],["都市|现代","都市言情"],["神医|医术","神医流"],["战神|兵王","战神兵王"],["赘婿|上门","赘婿逆袭"],["弃子|弃少","弃子逆袭"],["科举|权谋","科举权谋"]];
tys.forEach(function(x){if(new RegExp(x[0]).test(tx)&&!r.ty)r.ty=x[1]});if(!r.ty)r.ty="多元融合";
if(r.ty==="重生逆袭"){if(/复仇|报仇/.test(tx))r.st="复仇型重生";else if(/弥补|挽回/.test(tx))r.st="弥补型重生"}
var hks=[["一夜之间.*死|灭门|满门|砍头|抄家","灭门开局"],["重生.*归来|重生.*睁|回到.*年前","重生归来"],["穿越|穿成|醒来.*古代","穿越异世"],["退婚|退亲|休书","退婚打脸"],["未婚夫|世子|王爷.*婚","权贵婚约"],["系统|绑定|叮","系统降临"],["破产|背叛|离婚","落魄开局"],["复仇|报仇|雪恨","复仇主线"]];
hks.forEach(function(x){if(new RegExp(x[0]).test(tx))r.hk.push(x[1])});
var trs=[["庶妹|庶姐|嫡庶","嫡庶之争"],["打脸|啪啪|丢脸","打脸爽"],["扮猪|隐藏.*实力","扮猪吃虎"],["追妻.*火葬|后悔.*挽回","追妻火葬场"],["团宠|全民.*宠","团宠"],["金手指|空间|灵泉|传承","金手指"],["逆袭|翻身|翻盘","逆袭爽文"],["甜宠|宠溺|宠.*上天","高甜"],["替身|替嫁","替身"],["马甲|伪装.*身份","马甲流"]];
trs.forEach(function(x){if(new RegExp(x[0]).test(tx))r.tr.push(x[1])});
if(/虐|泪|痛|死.*别|悲伤/.test(tx))r.em="虐心向";else if(/甜|宠|暖|萌/.test(tx))r.em="甜宠向";else if(/爽|打脸|碾压|无敌/.test(tx))r.em="爽文向";else if(/悬疑|谜|诡/.test(tx))r.em="烧脑向";else r.em="综合向";
if(r.hk.length>=3)r.pc="极速（多钩子叠加）";else if(r.hk.length>=2)r.pc="紧凑";else r.pc="常规";
if(!r.hk.length)r.tp.push("缺少强力开篇钩子");if(ab&&ab.length<60)r.tp.push("简介过短(不足60字)");if(ab&&ab.length>250)r.tp.push("简介过长(超250字)");
return r}

function Tr(){
  var all=[];D.hot.forEach(function(b){all.push({t:b.title,a:b.abstract})});D["new"].forEach(function(b){all.push({t:b.title,a:b.abstract})});
  var tc={},hc={},rc={},ec={};all.forEach(function(b){var a=A(b.t,b.a);tc[a.ty]=(tc[a.ty]||0)+1;a.hk.forEach(function(h){hc[h]=(hc[h]||0)+1});a.tr.forEach(function(rt){rc[rt]=(rc[rt]||0)+1});ec[a.em]=(ec[a.em]||0)+1});
  var ts=Object.entries(tc).sort(function(a,b){return b[1]-a[1]});
  var hs=Object.entries(hc).sort(function(a,b){return b[1]-a[1]});
  var rs=Object.entries(rc).sort(function(a,b){return b[1]-a[1]});
  var h='<div class="ca"><h3>📊 当前番茄小说市场趋势（样本：'+all.length+'本）</h3>';
  h+=barChart(ts,ts[0]?ts[0][1]:1,"🎯 热门类型分布");
  h+=barChart(hs,hs[0]?hs[0][1]:1,"🪝 流行开篇钩子");
  h+=barChart(rs,rs[0]?rs[0][1]:1,"🎭 热门核心套路");
  var es=Object.keys(ec).sort(function(a,b){return(ec[b]||0)-(ec[a]||0)});
  h+='<div style="margin-top:16px;padding:16px;background:rgba(0,0,0,.2);border-radius:10px"><h4 style="color:#aaaaff">💡 创作建议</h4>';
  if(ts[0])h+='<div class="ln">1. 最热类型: <b>'+ts[0][0]+'</b>（红海，需做出差异化）</div>';
  if(hs[0])h+='<div class="ln">2. 标配钩子: <b>'+hs[0][0]+'</b>（前3章必须抛出）</div>';
