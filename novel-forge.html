<script id="nv" type="application/json">{"hot": [{"id": "1630324483249155", "title": "偏偏世子要娶我", "author": "温幸运", "abstract": "作为大长公主之女，一出生就是郡主之尊，定下与护国公世子的婚事，是大安朝人人羡慕的一对；一夜之间，全家一百余口人被冠上通敌的罪名，午门砍头。他却和庶妹给了自己一杯毒酒。原来所有的一切，都是阴谋。重生归来，她联手爱人，护好所有亲人，让一切恶人恶有恶报。"}, {"id": "6698512561156918275", "title": "人生三十", "author": "七分生", "abstract": "事业破产，娇妻背叛！成年人的世界没有容易。不穿越，无重生。没有意淫，只有真实，脚踏实地一步一个脚印逆风翻盘，走上神坛！\n八零后专属，玻璃心以及没经历过生活毒打者慎入！勿看！"}, {"id": "1625353478176782", "title": "极品仙尊在都市", "author": "扮阳吃虎", "abstract": "仙域万仙之尊一睁眼，居然成了上门女婿。\n前世被人各种瞧不起，重生之后，成了古武界的天才宗师，医学界的超级神医，术可通天，力能裂地。"}, {"id": "6730119336171670536", "title": "最强弃子", "author": "一毛渡江", "abstract": "林东阳，十二年前被家族抛弃沦为弃子，十二年后权势滔天富可敌国的他王者归来；\n他不仅打造了一个全球超级商业帝国，更是最神秘的组织“恶魔岛”的黄泉教主。"}, {"id": "1619002277549060", "title": "西游天殇", "author": "叶之秋", "abstract": "孙悟空上续太古以来的仙神争霸，下连诸天仙尊神王血斗，一路斩妖除魔，成就一段不朽传奇。天殇延续老叶一贯的权谋风格，局中有局，套中有套，被许多读者认为是写得最好的西游后传。"}, {"id": "1624278158883844", "title": "帝国争霸", "author": "白色孤岛", "abstract": "陈子昂一觉醒来，发现自己穿越到了陌生的年代，金戈铁马，满目疮痍，这是一个支离破碎的时代，这也是一个群雄逐鹿的时代，这是最好的时代，也是最坏的时代，陈子昂崛起于草莽，组建精锐之师，横扫天下，拯救黎明百姓，建立无上帝国！"}, {"id": "1631142533641227", "title": "农家子的科举之路", "author": "山的那边", "abstract": "穿越成家徒四壁的书生，前世计算机专业毕业，在此百无一用……姜丰想了想：万般皆下品，惟有读书高，还是硬着头皮考科举吧！\n这一路走下去，蓦然回首，已位极人臣、开疆拓土、创不世之基业了！PS：新书《一品寒士》已发布。"}, {"id": "1624193943574542", "title": "都市兵王", "author": "神无踪", "abstract": "【完结精品】【兵王】【校花】\n他姓陈、名生、字八荒，本是至强兵王，因一场意外入狱，监狱里各个都是人才，他喜得超强传承，回归花花世界保护大校花，他一次次拔刀，一路攀登，暮然回首已是遍地荣光。"}, {"id": "6693874279383043083", "title": "深渊星芒", "author": "星宇科幻", "abstract": "2185年，从高维通道传送过来的低级虫子占据了整个太阳系，人类被迫背井离乡，舍弃太阳系寻找新的家园，一路走来，流浪的地球舰队发现事情远远不是虫族入侵那么简单，整个银河系的文明都陷入了一场巨大的阴谋中。这是一个囊括银河系背景宏大的科幻故事，没有机甲进化，没有基因超神，更没有修炼渡劫。"}, {"id": "1621553079684110", "title": "走偏门", "author": "李二不哈", "abstract": "【改编短剧《捞偏门》《走偏门》《做局人》，漫剧《捞偏门之北漂》《歪路逆袭》《千面江湖》《捞偏记》感兴趣可以去看看】\n何为偏门？捞偏者，为自己谋活路，给他人算死局。一入偏门深似海，从此走遍五湖四海，混迹三教九流，见识世道人心。"}], "new": [{"id": "6766157068916231182", "title": "女总裁的超级司机", "author": "凤凰孤狼", "abstract": "虽然只是一名小司机，却有着常人所没有的大智慧，虽然只是一名小司机，却有着非同凡响的洞察力，虽然只是一名小司机，却与上司有着不一般的关系，虽然只是一名小司机，却在前行的路上缔造了一个又一个神话。"}, {"id": "6710491544828251147", "title": "武林七诀", "author": "注销用户1147545691098731", "abstract": "相传江湖有七种上乘武学，名为“武林七诀”。当年靖难之役明惠帝流落江湖消失于淮南一带，两百多年后淮南萧家堡惨遭灭门。幸存者萧凌踏入江湖寻觅真相，而因“武林七诀”之一鬼脉诀重现江湖卷入一场血雨腥风。"}, {"id": "1628345327911948", "title": "长生不可期", "author": "独孤一生只为你", "abstract": "“前辈你冷静冷静！我年纪还小！您就行行好放了我吧？”李无邪哀求不断，却始终无法摆脱眼前这个魔道女祖，\n她一万岁，艳压天下众仙，渡劫大能，魔道四大宗门，仙楼楼主。他是三清师兄们眼中的单纯小师弟，生性善良，结果却被她挥手镇压五花大绑起来，\n“老女人，死女人，臭女人，你今日若敢碰我，我师父知道一定不会饶了你？”\n“呦，小夫君三十来岁没有，脾气却是不好，来来来，妾身教教你怎么做人？”"}, {"id": "6742284482226686979", "title": "都市天兵：我的碰瓷老公", "author": "昨知", "abstract": "为逼女儿嫁给富二代，洛天震从路上拉了一个碰瓷的废物少年回家，让女儿二选一。没想到女儿直接拉着碰瓷少年去领了证……更没想到的是，这个碰瓷的废物少年身份并不一般：京城大少、第一大家族唯一继承人、修炼者、天界天兵……"}, {"id": "6740800866741128199", "title": "星灵之石", "author": "源风广漠", "abstract": "【我们等待了121亿年】【这是我们最后一次机会】【远古的星灵已经死去】【我们的宇宙正在被吞噬】【散落在银河系文明中的星灵之石】【是毁灭还是重生】"}, {"id": "6707567410615946254", "title": "万灵葬天", "author": "红尘心", "abstract": "无尽岁月后，少年锁囚从沙漠走出，世间灾难劫数降临...！\n他，是后世震惊天地的千古人王！\n他，是后世横推豪杰的索命死神！\n他，是后世一剑断时空的盖世剑神！\n他...也是人们心目中的希望，经历万千磨难，成就万世传奇之人！\n世人皆不凡，那有完美身，为人者，擅其长，每个人都能成为自己的传奇，因为，自己就是自己的主角，人生的这张画卷之上，只有终点之前的点点滴滴，你准备好了吗？请降临哪个属于你的光环之上！"}, {"id": "6687044045451037709", "title": "婚戒", "author": "鹰神A", "abstract": "（书名婚戒不是结婚戒指，而是婚姻生活需要戒许多，其中一条戒出轨，这可是底线。）\n欧阳敏娜超级模特，人称女王，婚后忍受不了寂寞，对婚姻开始不安分玩起了名堂。\n杨青山常年海外出差办公不问家事，对妻子照顾不周。\n夫妻离异后，夫妻仕途一片光明，当女明星，当大总裁。\n由于杨青山的原因，导致幼女杨朵朵发生巨大变化，……"}, {"id": "6769501911100951565", "title": "神龙快婿", "author": "风中的阳光", "abstract": "他本是一方战神，却因为伤病一傻三年，被人百般凌辱，唯有漂亮妻子与他不离不弃！\n情敌千方百计把他妻子骗到酒店，这时，他突然苏醒！\n战神归来，势不可挡！凡欺辱我者皆需付出代价！"}, {"id": "6683094033801153549", "title": "逍遥医婿", "author": "秘制红烧肉", "abstract": "遭人迫害疯了十年的段浪，机缘巧合下获得上古药王的传承，从此开启开挂人生。"}], "peak": [{"id": "7069948840148732967", "title": "部族荣光", "author": "丧狐", "abstract": "盛产美女的“姜氏部族”与“申屠部族”已开战三年，这让姜氏部族的成年男人近乎死绝，而一但输掉“部族生死战”，姜氏部族的所有女人，会被折磨致死，会被凌辱贩卖，绝望的气氛笼罩着整个部族，有人选择了逃亡，有人选择了背叛。\n　　十五岁的姜玄本还是一个半大孩子，为了母亲妹妹以及族里的女人们，他别无选择！\n　　我不装了！我摊牌了！\n　　我一直在隐藏实力！\n　　我！姜玄！姜氏部族最后一个男人！"}, {"id": "7091150316644600867", "title": "莫若凌霄", "author": "月关", "abstract": "唐从心，一个美术落榜生， 意外来到一方女帝世界，成为一个朝不保夕的没落皇孙。\n但，弃子亦有凌云志，没落皇孙当如龙。 \n这皇帝，祖父做得，祖母做得，我一个弃子也做得。"}, {"id": "7075952796322761739", "title": "高手下山，我有九个无敌师父！", "author": "小殇殇", "abstract": "【热血杀伐+无敌流+师姐+装逼爽文】\n七年前，家族被灭，惨遭羞辱，七年后，叶君临携带诸位师父的通天本领强势归来！\n和我比实力？我大师父武道之主，修为通神！\n和我比医术？我二师父一代圣医，可起死人肉白骨！\n和我比背景？我三师父一国国师，一言断人生死！\n和我比人多？我四师父北凉战神，统领百万雄兵！\n和我比有钱？我五师父商会之主，富可敌国！\n和我比美人？我有七个倾国倾城的师姐，个个都很宠我！\n新书《师弟，求求你饶了我吧！》欢迎阅读！"}, {"id": "6883748331202284558", "title": "惊鸿", "author": "一夕烟雨", "abstract": "『传统玄幻』『非后宫』九州大地有一楼，名为《烟雨楼》，烟雨楼主李庆之，有着绝代天骄之称，黑夜之中执掌生死，然而，世人所不知的是，烟雨楼背后还有一人，方才是烟雨楼真正的创始人，以纨绔子弟的身份为掩饰，拨弄风云，布局天下！"}, {"id": "6838086444733434884", "title": "玄幻，我顿悟了混沌体", "author": "叶大刀", "abstract": "萧云的系统只会一个功能——顿悟！体质平凡？顿悟混沌体！功法难修？顿悟圆满境界！神通难修？顿悟圆满境界！没有什么是顿悟不能解决的，如果有，那就顿悟十次，百次……"}, {"id": "7064405896540982309", "title": "武碎星河", "author": "妖夜", "abstract": "【新书《葬星棺》已发】\n神明在星空俯瞰，恶魔在地狱咆哮。\n这是一个万族争雄，神魔乱舞的奇幻世界。\n一个寒门少年持刀而行，逆流而上，他要成为这个世界的王！\n【本书改编动画《武碎星河》正在热映】"}, {"id": "7218822722090961958", "title": "萤火之城", "author": "童童", "abstract": "一段不曾走过的旅途，重新定义了生命的概念。一场从未有过的挑战和进化，开启对生命和情感的思考。“萤火之城”，自由与秩序的对立，自然与科技的统一，这里，窥见未来文明的一角。"}, {"id": "7137359676424850443", "title": "娇养玫瑰", "author": "美绿哔哔", "abstract": "［已签约出版]\n棠梨十六岁时一袭昆曲水袖舞的名动帝都，被誉为昆曲小洛神\n人人皆道，除了傅家那位被称为玉面佛子阎罗王的傅九爷\n无人能配得上小洛神\n只可惜，傅家那位天性薄情冷血，甜软乖娇如棠梨若跟了他定会吃苦\n一夕变故，棠梨被送出帝都\n昆曲小洛神的名头也再无人提起。\n直到有一日，\n坊间传闻傅九爷在家中养了位小姑娘\n小姑娘爱穿旗袍，一袭水袖舞的堪比当年的昆曲小洛神\n勾了九爷的心、夺了九爷的魄\n还有知情圈内人传闻那小姑娘还是傅九爷用了不光彩手段从自己侄子手里抢来的\n众人皆好奇小姑娘何许人也\n——\n某次宴会，\n有人亲眼看见传闻中冷情寡欲的傅九爷将一穿着旗袍的小姑娘抱在洗手台上吻的难舍难分\n小姑娘娇气地偏头躲吻，一巴掌拍在阎王爷下巴处，声音软嗲，\n“傅则谌，你还亲！”\n众人屏息，不敢多看\n但乌黑缎发顺着黛青色旗袍瀑下，那张清艳的脸分明就是曾经的昆曲小洛神。\n玉面佛子阎罗王终究是降在了小洛神的旗袍下。\n——“你是我贫瘠生命里，唯一的玫瑰。”"}, {"id": "7111200276232539166", "title": "天灾，我囤几十亿物资在末世求生", "author": "袅袅鱼音", "abstract": "（末世+重生+空间+囤物资）\n　　天灾骤降，世界巨变，先是极热，再是极寒，紧接着地震，大雾，永夜，酸雨接踵而至。\n　　孤身在末世挣扎求生十年的苏念，最后还是死在了倾盆而下的酸雨中。\n　　再次睁眼，苏念发现自己重生了，此时距离末世还有三个月。\n　　当在传家宝里发现一个巨大的随身空间后，苏念给自己定下了重生后的第一个小目标——花光21个亿，用物资把空间填满！\n　　从此，苏念开始了囤货模式。\n　　米面粮油？买！\n　　鸡鸭鱼肉？买！\n　　衣帽鞋袜？买！\n　　肉脯凤爪小火锅，薯片辣条螺蛳粉，一个都不能少！\n　　（天灾末世求生文，男主绝对出乎预料！）"}, {"id": "7096667097870109733", "title": "心肝宠", "author": "九棂", "abstract": "（顶级豪门+女主现代江南风美人+男主疯批+前期女主攻略+后期男主强势宠+双洁+好结局HE）\n为了肚子里的孩子，鹿之绫被迫嫁给疯批大佬，所有人都猜她活不到生崽之日。\n为保命她开始攻略，一不小心成了他的心尖宠。\n后来，她准备跑路。\n他的车停在悬崖之上，摇摇欲坠，他虚踩油门，笑得漫不经心，“我好像没听清，你是说……离婚？嗯？”\n后来，他轻抚她的脸，声线性感而残忍，“乖乖留在我身边，逃跑的人要受惩罚。”\n再后来，他满身血污地走到她面前，体力不支地倒在雨里，卑微如泥，“我到底要怎么做，你才肯留在我身边？”\n最后的最后，他闷声问她，“心肝，今天也不能亲一下？”"}, {"id": "7101803652683140111", "title": "够野", "author": "纠纠猫", "abstract": "实体已上市/同名短剧已上线\n【美艳清醒女销售&腹黑房产总裁】\n男女互撩，极限拉扯，棋逢对手。\n酒吧厕所门口，苏郁向沈衍借了个火，苏郁娴熟地点燃香烟，轻吐了一口烟雾，烟雾缭绕在她冷艳的面容上，那斜视的狐狸眼，看上去妖媚又野性十足。\n倒是让人忍不住心生征服之意。\n沈衍的目光在她身上停留了一会儿，唇角勾起，“够野，我喜欢。”\n苏郁挑眉：“既然喜欢，那不如今晚去我家？”\n\n某天苏郁说：“沈衍，我觉得我们三观不合。”\n黑夜中，沈衍叼着烟，嘴角扬起了一抹不羁的笑容，：“我觉得很合。”\n所有人见到苏郁的第一眼，都会觉得她是一个典型的冷艳美人。\n不，苏郁只是外表冷艳，实际上她内心是一个极致善变的女人。\n只有沈衍懂她，知道她想要什么。\n他知道她的故作矜持，她明他的图谋不轨。"}, {"id": "6823667291557727235", "title": "皇后重生要谋反", "author": "流心蜜糖", "abstract": "本书原名《皇后重生要谋反》\n改编短剧《重生皇后不好惹》\n前世，她用医术替他拉拢人心，让外祖用兵权助他登位，结果最后却换来满门屠杀，惨死收场。\n重活一世，她绝不会再让自己活成一场笑话。\n她要用她五年的记忆，高超的医术，力挽狂澜。\n保幼弟，护祖母，斗白莲，杀渣男。\n她要让所有害她的人血债血偿！\n只是这前世夫君的弟弟怎么缠上了她？\n说好不再入他夜家门的，结果却终是难逃这前世今生的命运！\n前世今生都是1V1，无敌甜宠文，大家一定要看哦！"}, {"id": "7244061177171414054", "title": "你干嘛！开局迪迦，无限能量", "author": "五月竹", "abstract": "【领主争霸+召唤爆兵+无敌暴爽+奥特曼】\n  时隔多年，蓝星又一次进入万界争霸的时代。\n  人类将再一次进行求生试炼，杀怪升级，称霸诸天。\n  可以觉醒的职业有很多，属性者、能力者、种族者、召唤师等等，而最为强大的当属领主职业。\n  顾九歌，竟然获得诸天银河系统，职业被选择为领主，原本的顶级兵种银河怪兽居然被系统改为唯一兵种--奥特曼，迪迦、梦比优斯、贝利亚、赛罗、托雷基亚等奥特曼一个个被召唤出来，让全世界看看光的力量。\n  你相信光吗？"}, {"id": "7599283708138359832", "title": "我是老五，出生就背了1540元", "author": "雪糕会化", "abstract": "我出生的那天，给我家带来了1540元的罚款。为了还这笔债，我半辈子都在拼命讨好所有人。我有4个姐姐，我妈又怀孕了。\n"}, {"id": "7634018392684366873", "title": "魏时长子：我，曹昂，横扫三国", "author": "丰静越", "abstract": "重生建安二年，曹昂于宛城死局中逆天改命。无系统无玄幻，凭现代知识整军屯田、革新制度，蛰伏归曹，辅父定北。官渡扬威、赤壁止损、汉中抗蜀、襄樊破敌，斗曹丕、压司马、灭吴吞蜀，终以长子之身一统九州，开万世太平！\n本书前期蛰伏积蓄力量，中期开始三国各大战役均有亮眼表现。各位看官:请跟随曹昂一起，见证魏时长子的力量！！！"}, {"id": "7640032231766887448", "title": "当S级上将遇到满级代练", "author": "一颗梅子熟了", "abstract": "陈珂清穿越了，成了星际豪门里手无缚鸡之力的“普通人”。\n幸好，全息游戏《仙元大陆》开服了！作为前世代练大神，他摩拳擦掌准备重操旧业，靠技术赚点零花钱。\n结果刚进游戏，就被一个战斗力爆表、还特别爱管人的“大佬”缠上了。\n陆靳川最近很苦恼。\n休假玩个游戏想放松一下，结果遇到了一个看起来软萌好欺负，切开全是黑的小机灵鬼。\n这人明明是个生活玩家，怎么打起架来比军部的刺头还狠？\n更离谱的是，这小家伙的操作让他这个S级精神力上将都觉得……有点上头？\n直到某天，星际宴会上。\n毫无存在感的陈家二少爷，被那位高不可攀的帝国上将堵在了角落。\n陆靳川看着眼前瑟瑟发抖（装的）的青年，挑眉一笑：“游戏里不是挺能打的吗？嗯？”\n白切黑戏精受 x 爹系腹黑攻 | 游戏里大杀四方，现实里甜度超标"}, {"id": "7639564685473221657", "title": "封神：替帝辛翻案后，我成了人皇", "author": "砚临渊", "abstract": "穿越到封神之前，殷玄成了商朝末年的废柴修士——丹田破碎，修为全无，连杂役都能踩他一脚。\n本想躺平等死，却意外激活【翻案系统】：“替帝辛正名，重塑人族气运，奖励人皇传承。”\n他翻遍古籍，发现真相触目惊心：酒池肉林、炮烙之刑，全是天庭为抹杀人族编造的谎言！纣王之名，竟是诸神强加的一口黑锅！\n撕碎神使通缉令，当众揭穿姜子牙篡改史书，一拳轰爆雷部追杀令——废柴逆袭，一路打脸。\n碎了三千年的人皇剑，在他手中重新凝聚。眼看就要登临人皇之位，系统突然弹出血红警告：\n“帝辛并未陨落。你的翻案，早在他三千年前的算计之中。”\n身后，一道苍老的声音幽幽响起：\n“殷玄，你做得不错……现在，该把身体还给我了。”"}, {"id": "7633625266174037054", "title": "开局英甲，升级奖励巨星模板", "author": "小潮Eric", "abstract": "因为一纸资本协议，我被硬塞进英格兰甲级联赛，加盟哈德斯菲尔德镇足球俱乐部，成了队友口中的“关系户”，球迷眼里的“夏国水货”！\n就在被全英格兰媒体嘲讽的当晚，【神级球星模板系统】激活！开局融合巅峰梅西，单场连过十一人破门！\n教练：“我错了，求你别走！”队友：“他就是上帝，把球给他就对了！”\n从今天起，英甲的球门将被我一人承包！赛季升级，奖励C罗模板！制霸英超，奖励大罗模板！\n当整个欧洲足坛为我颤抖，当顶级豪门的千金为我痴狂，我只想问一句：\n“我，一个夏国前锋，现在要捧起世界杯，谁赞成，谁反对？”"}, {"id": "7616572303186349080", "title": "我是捡来的，原来我有顶级家世", "author": "爱吃草头烧饼", "abstract": "新手开书，可能很多文笔还能稚嫩，谢谢大家的支持，背景为平时时空，也与现实有一些出入，请大家不用贴合现实阅读，感谢！   （重生+无系统+单女主+无脑爽文）                                                   重生2003，他只想考个公务员，报答养父的恩情。\n直到有一天，顶级世家找到他：\n“你背上的伤疤，是我们家丢了二十一年的孩子。”\n从筒子楼到燕京权力中枢\n这一世，他有爱人相伴，有兄弟相助。\n那些前世害他的人，一个都跑不掉。"}, {"id": "7543601522781719577", "title": "异能铭录", "author": "念乔乔", "abstract": "【都市异能】【配角群像】【水系崛起】【无后宫】【奇经八脉】\n当少年在18岁生日当天觉醒禀赋之力，是精神失常还是血脉传承？\n在日渐繁华的都市生活之外，是否存在平行世界的异能之辈？\n在学习工作之余，你是否想过改变世界？改变未来？\n在我们生活的现代社会里，仍旧存在着我们不曾发觉的奇妙冒险。"}, {"id": "7641564272476032062", "title": "穿成初恋，驯化嘴硬兵痞", "author": "予妩", "abstract": "馋嘴甜妹 VS 清冷硬汉\n \n苏莳野前世谨小慎微压抑半生，一朝穿书，竟成了狠心辜负少年的负心初恋。\n重活一世她彻底想开，抛开所有束缚随性度日，偏爱美食更偏爱顺眼之人，活得自在又鲜活。\n \n靳戍自幼缺爱寡言，满心热忱惨遭抛弃，入伍从军后性子愈发冷硬寡淡，周身生人勿近，满心温柔尽数藏起。\n \n恰逢分手前夕，苏莳野果断止损奔赴千里，主动靠近暖心相待。\n她性情鲜活软糯，心思灵动满眼欢喜，满心满眼都惦记着身边人；\n他外表冷硬嘴硬别扭，嘴上百般推脱拒绝，一举一动却全是纵容与破例。\n \n颜控手控双重加持，她一眼沦陷步步撩人，慢慢融化他满身冰霜。\n昔日她亲手将他推入孤寂深渊，今生换她奔赴而来，哄软他一身锋芒，从此烟火相伴，岁岁温情，甜度满分。"}, {"id": "7638192830204087358", "title": "地下城蜂王围养世界", "author": "谁看到了我的兔子", "abstract": "【非人流+幕后养成+蜂群进化+地下城扩张】\n蜂是最勤劳的动物，它们采粉，采蜜，交配，打架……总是忙忙碌碌。\n安文看到这句话，心里只有一句：人算动物吗？\n不太像。\n那牛马呢？\n安文不是，不是人更不是牛马，是蜂群的唯一雄蜂，幸运的是蜂后死了，不幸的是靠山也没了。\n重振族群的任务落在肩上， 称号勇者的他决心带着蜂群成为地下城的王者。\n至少得在这第六层安定下来。"}, {"id": "7572556079242939454", "title": "辞职后我在西北碰上了真爱！", "author": "作者耳朵橙", "abstract": "尤霜在实习结束以后不知道后面可以继续做什么，通过一个契机了解到了千里之外有个荒原的小城叫原城，尤霜决定去散散心开拓一下眼界，但是与试飞员邓立境发生的一系列故事"}]}</script>
