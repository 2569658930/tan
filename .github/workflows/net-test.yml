name: Earn Test
on:
  workflow_dispatch:

jobs:
  earn:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Test money platforms
        run: |
          echo "# Money Platform Tests" > results.md
          echo "\`\`\`" >> results.md
          
          echo "=== Bountycaster ===" | tee -a results.md
          curl -s --max-time 10 "https://www.bountycaster.xyz/" -o /dev/null -w "HTTP %{http_code}
" | tee -a results.md
          
          echo "=== Superteam Earn ===" | tee -a results.md
          curl -s --max-time 10 "https://earn.superteam.fun/" -o /dev/null -w "HTTP %{http_code}
" | tee -a results.md
          
          echo "=== Binance Earn ===" | tee -a results.md  
          curl -s --max-time 10 "https://www.binance.com/en/earn" -o /dev/null -w "HTTP %{http_code}
" | tee -a results.md
          
          echo "=== Gitcoin Explorer ===" | tee -a results.md
          curl -s --max-time 10 "https://explorer.gitcoin.co/" -o /dev/null -w "HTTP %{http_code}
" | tee -a results.md
          
          echo "=== Algora ===" | tee -a results.md
          curl -s --max-time 10 "https://algora.io/bounties" -o /dev/null -w "HTTP %{http_code}
" | tee -a results.md
          
          echo "=== Opire ===" | tee -a results.md
          curl -s --max-time 10 "https://opire.dev" -o /dev/null -w "HTTP %{http_code}
" | tee -a results.md
          
          echo "=== Dework ===" | tee -a results.md
          curl -s --max-time 10 "https://dework.xyz" -o /dev/null -w "HTTP %{http_code}
" | tee -a results.md
          
          echo "\`\`\`" >> results.md
          
          echo "" >> results.md
          echo "## Bountycaster Content" >> results.md
          echo "\`\`\`" >> results.md
          curl -s --max-time 15 "https://www.bountycaster.xyz/" 2>/dev/null | grep -oiP '(\$[\d,]+|bounty|reward|earn|pay)' | head -20 >> results.md 2>&1
          echo "\`\`\`" >> results.md
          
      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: platform-tests
          path: results.md
