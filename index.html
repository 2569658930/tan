<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎵 Suno Funnel — AI音乐提示词一键生成</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:linear-gradient(135deg,#0a0a2e 0%,#1a1a4e 50%,#0d0d35 100%);min-height:100vh;color:#e0e0ff;padding:20px}
.container{max-width:640px;margin:0 auto}
.header{text-align:center;padding:30px 0 20px}
.header h1{font-size:2em;margin-bottom:8px}
.header p{color:#8888cc;font-size:.95em}
.tabs{display:flex;gap:2px;background:rgba(255,255,255,.05);border-radius:12px;padding:4px;margin-bottom:24px}
.tab{flex:1;padding:12px 8px;text-align:center;border-radius:10px;cursor:pointer;font-size:.9em;font-weight:600;transition:all .2s;color:#8888cc;border:none;background:transparent}
.tab.active{background:rgba(120,120,255,.2);color:#fff}
.tab:hover{background:rgba(120,120,255,.1)}
.card{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:14px;padding:24px;margin-bottom:20px}
.card h3{font-size:1.1em;margin-bottom:16px;color:#aaaaff}
.form-group{margin-bottom:16px}
.form-group label{display:block;font-size:.85em;color:#8888cc;margin-bottom:6px;font-weight:500}
select,input,textarea{width:100%;padding:12px 16px;border-radius:10px;border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.06);color:#fff;font-size:.95em;outline:none;transition:border .2s}
select:focus,input:focus,textarea:focus{border-color:#6666ff}
select option{background:#1a1a4e;color:#fff}
textarea{min-height:80px;resize:vertical}
.btn{width:100%;padding:14px;border-radius:12px;border:none;font-size:1em;font-weight:600;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:8px}
.btn-primary{background:linear-gradient(135deg,#6666ff,#8844ff);color:#fff;box-shadow:0 4px 20px rgba(100,100,255,.3)}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 6px 25px rgba(100,100,255,.4)}
.btn-copy{background:rgba(255,255,255,.08);color:#ccc;margin-top:12px}
.output-box{background:rgba(0,0,0,.3);border:1px solid rgba(255,255,255,.1);border-radius:12px;padding:20px;font-family:'SF Mono',monospace;font-size:.9em;line-height:1.6;white-space:pre-wrap;word-break:break-word;max-height:400px;overflow-y:auto;margin-top:12px}
.hidden{display:none}
.footer{text-align:center;padding:30px 0;border-top:1px solid rgba(255,255,255,.06);margin-top:30px}
.footer a{display:inline-block;margin:8px;padding:10px 24px;border-radius:25px;text-decoration:none;font-weight:600;font-size:.9em}
.footer .coffee{background:#FF813F;color:#fff}
.footer .github{background:rgba(255,255,255,.1);color:#ccc}
.footer a:hover{transform:translateY(-2px)}
@media(max-width:480px){.header h1{font-size:1.5em}}
</style>
</head>
<body>
<div class="container">
<div class="header"><h1>🎵 Suno Funnel</h1><p>选艺人、填想法 → 一键出 Suno 提示词，直接复制贴进去用</p></div>

<div class="tabs">
<button class="tab active" onclick="switchTab('cover')">🎤 翻唱</button>
<button class="tab" onclick="switchTab('remix')">🎛 Remix</button>
<button class="tab" onclick="switchTab('original')">🎸 原创</button>
<button class="tab" onclick="switchTab('inspire')">🎲 灵感</button>
</div>

<div id="tab-cover" class="card">
<h3>🎤 翻唱 Cover</h3>
<div class="form-group"><label>1. 参考哪位艺人的风格？</label><select id="cover-artist"></select></div>
<div class="form-group"><label>2. 歌曲名 / 主题</label><input id="cover-song" placeholder="比如: 晴天 / 好久不见 / 夜曲"></div>
<div class="form-group"><label>3. 翻唱风格</label><select id="cover-style"></select></div>
<button class="btn btn-primary" onclick="genCover()">✨ 生成提示词</button>
<div class="output-box hidden" id="cover-out"></div>
<button class="btn btn-copy hidden" id="cover-copy" onclick="copyText('cover-out')">📋 复制到剪贴板</button>
</div>

<div id="tab-remix" class="card hidden">
<h3>🎛 Remix 重混</h3>
<div class="form-group"><label>1. 创作主题</label><input id="remix-theme" placeholder="比如: 深夜城市霓虹 / 夏日海滩"></div>
<div class="form-group"><label>2. 曲风</label><select id="remix-genre"></select></div>
<button class="btn btn-primary" onclick="genRemix()">🎛 生成 Remix</button>
<div class="output-box hidden" id="remix-out"></div>
<button class="btn btn-copy hidden" id="remix-copy" onclick="copyText('remix-out')">📋 复制到剪贴板</button>
</div>

<div id="tab-original" class="card hidden">
<h3>🎸 原创歌曲</h3>
<div class="form-group"><label>1. 参考艺人风格（可选）</label><select id="orig-artist"><option value="">不参考，自由发挥</option></select></div>
<div class="form-group"><label>2. 歌曲主题</label><input id="orig-theme" placeholder="写下你的想法..."></div>
<div class="form-group"><label>3. 歌曲结构</label><select id="orig-struct"><option value="ballad">情歌 Verse→Chorus→Bridge</option><option value="electronic">电子 Build→Drop→Verse→Drop</option><option value="hiphop">说唱 Verse→Hook→Verse→Hook</option><option value="standard">标准 Verse→PreChorus→Chorus</option></select></div>
<button class="btn btn-primary" onclick="genOriginal()">🎵 生成</button>
<div class="output-box hidden" id="orig-out"></div>
<button class="btn btn-copy hidden" id="orig-copy" onclick="copyText('orig-out')">📋 复制到剪贴板</button>
</div>

<div id="tab-inspire" class="card hidden">
<h3>🎲 没灵感？随机来一个</h3>
<p style="color:#8888cc;margin-bottom:16px">不知道做什么？点一下，随机搭配艺人和主题出完整方案。</p>
<button class="btn btn-primary" onclick="genRandom()">🎲 随机生成</button>
<div class="output-box hidden" id="inspire-out"></div>
<button class="btn btn-copy hidden" id="inspire-copy" onclick="copyText('inspire-out')">📋 复制到剪贴板</button>
</div>

<div class="footer">
<p style="color:#8888cc;margin-bottom:12px">觉得有用？请我喝杯咖啡 ☕</p>
<a class="coffee" href="https://www.buymeacoffee.com/2569658930" target="_blank">☕ Buy Me a Coffee</a>
<a class="github" href="https://github.com/2569658930/tan" target="_blank">⭐ GitHub</a>
<p style="margin-top:16px;font-size:.8em;color:#555">免费开源 · MIT License · 100+ 精品提示词</p>
</div>
</div>

<script>
// ── DATA ──────────────────────────────────────────────────────────
var A={"周杰伦":{s:"Mandarin pop, R&B, piano ballad, Chinese pentatonic, melancholic male tenor, 80-100 BPM",t:"slightly nasal, melancholic male tenor, relaxed delivery"},"林俊杰":{s:"Mandarin pop ballad, powerful tenor vocal, piano-driven, emotional, wide vocal range, 70-90 BPM",t:"powerful clear tenor, effortless high notes, emotional vibrato"},"邓紫棋":{s:"Mandarin pop, female belting vocal, rock influence, high notes, emotional build-up, 80-100 BPM",t:"strong belting female vocal, gritty texture, wide dynamic range"},"陈奕迅":{s:"Cantopop ballad, deep baritone vocal, minimalist arrangement, storytelling, 60-80 BPM",t:"deep warm baritone, storytelling tone, understated power"},"五月天":{s:"Mandarin rock, band sound, uplifting, guitar-driven, stadium anthem, 120-140 BPM",t:"band vocal, energetic rock tenor, crowd-feel"},"蔡依林":{s:"Mandopop dance, electronic, female vocal, upbeat, synth-heavy, 120-130 BPM",t:"bright pop female vocal, precise articulation, dance energy"},"薛之谦":{s:"Mandarin ballad, emotional male vocal, string arrangement, dramatic, 70-85 BPM",t:"raspy emotional male, intimate delivery, whispered sections"},"王菲":{s:"Art pop, ethereal female vocal, dreamy, reverb-heavy, atmospheric, 60-80 BPM",t:"ethereal soprano, breathy delivery, floating tone"},"陶喆":{s:"Mandarin R&B, soulful male vocal, falsetto, groovy bass, 80-100 BPM",t:"smooth R&B tenor, effortless falsetto, groovy phrasing"},"李荣浩":{s:"Mandarin pop, laid-back male vocal, guitar-based, minimalist production, 70-90 BPM",t:"laid-back male vocal, conversational tone, subtle emotion"},"Taylor Swift":{s:"Pop, confessional female vocal, acoustic guitar, storytelling, 80-120 BPM",t:"confessional female vocal, intimate, storytelling delivery"},"Adele":{s:"Soul pop, powerful female vocal, piano, emotional ballad, 60-80 BPM",t:"powerful female vocal, emotional delivery, wide range"},"Bruno Mars":{s:"Funk, soul, retro pop, male vocal, groovy bass, 100-115 BPM",t:"groovy male vocal, retro soul, falsetto runs"},"Ed Sheeran":{s:"Pop folk, acoustic guitar, male vocal, loop pedal, 80-100 BPM",t:"warm male vocal, acoustic intimacy, loop-layered"},"BTS":{s:"K-pop, rap, vocal harmony, electronic, dance, 120-140 BPM",t:"K-pop vocal, polished delivery, rap-sung switch"},"Billie Eilish":{s:"Alternative pop, whisper vocal, 808 bass, dark atmosphere, minimal, 75 BPM",t:"whisper vocal, ASMR delivery, dark intimate"},"Lana Del Rey":{s:"Baroque pop, sultry female vocal, orchestral, vintage Americana, 65 BPM",t:"sultry female vocal, reverb-drenched, cinematic"},"Coldplay":{s:"Alternative rock anthem, piano-driven, stadium chorus, uplifting, 130 BPM",t:"anthemic male vocal, falsetto, stadium energy"}};
var CS=[{id:"piano",n:"钢琴版",p:"piano cover, solo piano arrangement, classical influence, minimal, spacious, emotional reimagining"},{id:"acoustic",n:"原声版",p:"acoustic cover, stripped down, soft guitar, intimate vocal, raw emotion, campfire feel"},{id:"orchestral",n:"管弦乐版",p:"orchestral cover, cinematic strings, epic, film score style, dramatic build, full symphony"},{id:"lofi",n:"Lo-fi版",p:"lofi cover, chill beats, warm vinyl sound, relaxed version, bedroom pop, filtered production"},{id:"rock",n:"摇滚版",p:"rock cover, electric guitar reinterpretation, band energy, powerful drums, stadium rock"},{id:"electronic",n:"电子版",p:"electronic cover, synth remake, retro 80s, digital reimagining, modern production, club energy"},{id:"jazz",n:"爵士版",p:"jazz cover, swing reinterpretation, walking bass, lounge piano, sophisticated, smoky atmosphere"},{id:"chinese_traditional",n:"国风版",p:"Chinese traditional reinterpretation, 古筝 and 笛子, pentatonic melody, 琵琶, elegant, poetic"}];
var RG=[{id:"electronic",n:"电子舞曲",p:"electronic remix, synth, arpeggiator, 808 drums, sidechain compression, 128 BPM, club energy, massive drop"},{id:"lofi",n:"Lo-fi 放松",p:"lofi remix, chillhop, vinyl crackle, mellow, filtered drums, 80 BPM, study beats, warm atmosphere"},{id:"trap",n:"Trap 重拍",p:"trap remix, 808 bass, dark melody, hi-hat rolls, 145 BPM, hard-hitting, modern production, epic drop"},{id:"house",n:"House 律动",p:"deep house remix, groovy bassline, piano chords, soulful vocal chops, 122 BPM, warm, uplifting"},{id:"rock",n:"摇滚电音",p:"rock electronic remix, electric guitar riffs, heavy drums, synth bass, 130 BPM, energetic fusion"},{id:"chinese",n:"国风电音",p:"Chinese electronic fusion, 古筝 samples, 128 BPM, trap beat, 笛子 melody processed, cyberpunk traditional"}];
var TH=["深夜城市霓虹","夏日海滩的告别","雨天下的便利店","地铁最后一班车","旧照片里的笑脸","无人接听的电话","天台上的星空","凌晨三点的便利店","那年冬天的约定","一个人的电影院","日记本最后一页","城市的天际线","放学后的操场","咖啡馆的窗边","海边的烟花","初雪天的约定","老唱片里的回忆","霓虹灯下的孤独","樱花落下的瞬间"];
var ST={ballad:"Verse → Verse2 → Chorus → Bridge → Chorus → Outro (slow fade)",electronic:"Intro → Build → Drop → Verse → Build → Drop → Bridge → Final Drop",hiphop:"Intro → Verse → Hook → Verse2 → Hook → Bridge → Hook → Outro",standard:"Verse → Pre-Chorus → Chorus → Verse2 → Chorus → Bridge → Chorus → Outro"};

// ── INIT ──
function init(){
  var sa=document.getElementById('cover-artist'),oa=document.getElementById('orig-artist');
  Object.keys(A).forEach(function(k){sa.innerHTML+='<option value="'+k+'">'+k+'</option>';oa.innerHTML+='<option value="'+k+'">'+k+'</option>'});
  document.getElementById('cover-style').innerHTML=CS.map(function(s){return'<option value="'+s.id+'">'+s.n+'</option>'}).join('');
  document.getElementById('remix-genre').innerHTML=RG.map(function(g){return'<option value="'+g.id+'">'+g.n+'</option>'}).join('');
}
init();

// ── TABS ──
function switchTab(t){
  var tabs=document.querySelectorAll('.tab'),cards=document.querySelectorAll('.card');
  tabs.forEach(function(x){x.classList.remove('active')});
  cards.forEach(function(x){x.classList.add('hidden')});
  document.getElementById('tab-'+t).classList.remove('hidden');
  document.querySelectorAll('.tab')[{cover:0,remix:1,original:2,inspire:3}[t]].classList.add('active');
}

// ── HELPERS ──
function show(id,btnId){var e=document.getElementById(id);e.classList.remove('hidden');if(btnId)document.getElementById(btnId).classList.remove('hidden')}
function copyText(id){var t=document.getElementById(id).textContent;navigator.clipboard.writeText(t).then(function(){alert('✅ 已复制！直接贴入 Suno')})}

// ── GENERATORS ──
function genCover(){
  var art=document.getElementById('cover-artist').value,song=document.getElementById('cover-song').value||'未命名';
  var sid=document.getElementById('cover-style').value,ad=A[art],sd=CS.find(function(s){return s.id===sid});
  if(!ad||!sd)return;
  var bpm=(ad.s.match(/\d+-\d+ BPM/)||['90-120'])[0];
  var out='[Cover Version]\nOriginal: '+art+' — '+song+'\nStyle: '+sd.n+'\n\n🎤 Suno Prompt:\nA '+sd.p+', cover of '+song+' originally in the style of '+art+'. '+ad.t+'. Professional production, clean mix, emotional delivery.\n\n📝 Style Tags: '+ad.s+'\n\n📊 Settings:\n  BPM: '+bpm+'\n  Vocals: '+ad.t+'\n\n🚀 汽水音乐上传:\n  分类: 选「原创」→ 不要选「翻唱」\n  标题: '+song+' ('+sd.n+')\n  描述: AI音乐创作实验作品\n  封面: 自制 800x800 图';
  document.getElementById('cover-out').textContent=out;show('cover-out','cover-copy');
}

function genRemix(){
  var theme=document.getElementById('remix-theme').value||'未命名',gid=document.getElementById('remix-genre').value;
  var g=RG.find(function(x){return x.id===gid});if(!g)return;
  var out='[Remix Version]\nTheme: '+theme+'\nStyle: '+g.n+'\n\n🎤 Suno Prompt:\nA '+g.p+', '+theme+'. Driving energy, professional production, clean mastering.\n\n🚀 汽水音乐上传:\n  选「音频投稿」→「原创」\n  标题: '+theme+' ('+g.n+')\n  标签: #原创 #AI音乐 #'+g.n;
  document.getElementById('remix-out').textContent=out;show('remix-out','remix-copy');
}

function genOriginal(){
  var art=document.getElementById('orig-artist').value,theme=document.getElementById('orig-theme').value||'未命名';
  var sk=document.getElementById('orig-struct').value;
  var sp='Mandarin pop, emotional vocal, modern production, clean mix',tp='emotional vocal, clear articulation';
  if(art&&A[art]){sp=A[art].s;tp=A[art].t}
  var bpm=(sp.match(/\d+-\d+ BPM/)||['90-120'])[0];
  var out='[Original]\nRef: '+(art||'自由创作')+'\nTheme: '+theme+'\n\n🎤 Suno Prompt:\n'+sp+'. A song about '+theme+', '+tp+'. Professional production, emotional delivery.\n\n🎼 Structure:\n'+ST[sk]+'\n\n📊 BPM: '+bpm+'\n  Duration: 3:00-4:30\n\n🚀 汽水音乐上传: 分类选「原创」, 标题: '+theme;
  document.getElementById('orig-out').textContent=out;show('orig-out','orig-copy');
}

function genRandom(){
  var ks=Object.keys(A),art=ks[Math.floor(Math.random()*ks.length)];
  var theme=TH[Math.floor(Math.random()*TH.length)];
  var st=CS.concat(RG),style=st[Math.floor(Math.random()*st.length)];
  var ad=A[art],isR=RG.indexOf(style)>=0;
  var bpm=(ad.s.match(/\d+-\d+ BPM/)||['90-120'])[0];
  var out=isR?
    '[Random Remix]\n🎲 '+art+' 风格 × '+style.n+'\n\nTheme: '+theme+'\n\n🎤 Suno Prompt:\nA '+style.p+', '+theme+'. '+ad.t+'. Professional production.\n\n📊 BPM: '+bpm:
    '[Random Cover]\n🎲 '+art+' 风格 × '+style.n+'\n\nSong: '+theme+'\n\n🎤 Suno Prompt:\nA '+style.p+', '+theme+'. '+ad.t+'. Professional production, emotional delivery.\n\n📝 Reference: '+ad.s;
  document.getElementById('inspire-out').textContent=out;show('inspire-out','inspire-copy');
}
</script>
</body>
</html>
